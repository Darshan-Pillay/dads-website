<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 200" width="780" height="200">
  <!-- Gold 4-point star (Polaris north-star, kept) -->
  <path d="M50,6 L58,42 L94,50 L58,58 L50,94 L42,58 L6,50 L42,42 Z"
        transform="translate(22,52) scale(1.1)" fill="#C6A15B"/>
  <!-- Orange comet tail / heritage swoosh (Softfinity amber) -->
  <path d="M 132 112 Q 178 78, 224 112"
        stroke="#E8821E" stroke-width="7" fill="none" stroke-linecap="round"/>
  <!-- Softfinity wordmark + gold full stop -->
  <text x="246" y="142" font-family="Georgia, 'Times New Roman', serif"
        font-size="108" font-weight="500" letter-spacing="-2">
    <tspan fill="#FFFFFF">Softfinity</tspan><tspan fill="#C6A15B">.</tspan>
  </text>
</svg>
