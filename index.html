<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Softfinity — concept review · 3 directions</title>
<link rel="icon" href="assets/favicon-32.png">
<style>
  :root {
    --obsidian: #0B0B12;
    --ink: #15151F;
    --hairline: rgba(255,255,255,0.08);
    --hairline-2: rgba(255,255,255,0.14);
    --slate: #9CA3AF;
    --mist: #6B7280;
    --snow: #F3F4F6;
    --white: #FFFFFF;
    --gold: #C6A15B;
    --gold-deep: #9C7C3E;
    --amber: #E8821E;
    --bar-h: 64px;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; background: var(--obsidian); color: var(--snow); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif; }
  body { overflow: hidden; }

  /* ---------- top bar ---------- */
  .topbar {
    position: fixed; top: 0; left: 0; right: 0; height: var(--bar-h); z-index: 100;
    display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; gap: 16px;
    padding: 0 22px;
    background: linear-gradient(to bottom, rgba(11,11,18,0.94), rgba(11,11,18,0.84));
    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--hairline);
  }
  .topbar__brand { display: flex; align-items: center; gap: 12px; min-width: 0; }
  .topbar__brand img { height: 26px; width: auto; flex: none; }
  .topbar__brand .meta { font-size: 12px; color: var(--mist); letter-spacing: 0.04em; text-transform: uppercase; }
  .topbar__brand .meta strong { color: var(--gold); font-weight: 500; }

  /* segmented control */
  .switcher {
    display: inline-flex; padding: 4px; gap: 2px;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--hairline-2); border-radius: 999px;
  }
  .switcher button {
    appearance: none; border: 0; background: transparent; color: var(--slate);
    font: inherit; font-size: 13.5px; font-weight: 500; line-height: 1;
    padding: 9px 18px; border-radius: 999px; cursor: pointer;
    display: inline-flex; align-items: center; gap: 8px;
    transition: color 200ms ease, background 200ms ease;
  }
  .switcher button .letter {
    font-family: Georgia, "Times New Roman", serif;
    font-size: 13px; font-weight: 600; color: var(--gold);
    width: 20px; height: 20px; border-radius: 50%;
    background: rgba(198,161,91,0.10); border: 1px solid rgba(198,161,91,0.32);
    display: inline-flex; align-items: center; justify-content: center;
    flex: none;
  }
  .switcher button:hover { color: var(--snow); }
  .switcher button[aria-selected="true"] {
    background: var(--white); color: var(--obsidian);
  }
  .switcher button[aria-selected="true"] .letter {
    background: var(--gold); border-color: var(--gold); color: var(--obsidian);
  }

  /* right side: short blurb that changes per option */
  .topbar__hint {
    text-align: right; font-size: 12.5px; color: var(--mist);
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .topbar__hint kbd {
    font-family: inherit; font-size: 11px; padding: 2px 7px;
    background: rgba(255,255,255,0.06); border: 1px solid var(--hairline-2);
    border-radius: 6px; color: var(--snow); margin: 0 2px;
  }

  /* ---------- frame area ---------- */
  .stage {
    position: fixed; left: 0; right: 0; bottom: 0; top: var(--bar-h);
    background: var(--obsidian);
  }
  .stage iframe {
    width: 100%; height: 100%; border: 0; display: block;
    opacity: 0; transition: opacity 280ms ease;
  }
  .stage iframe.is-ready { opacity: 1; }

  /* loading shimmer */
  .stage::before {
    content: ""; position: absolute; inset: 0;
    background:
      radial-gradient(420px 200px at 50% 38%, rgba(198,161,91,0.10), transparent 70%),
      radial-gradient(1.4px 1.4px at 22% 28%, rgba(255,255,255,0.30), transparent),
      radial-gradient(1px 1px at 70% 60%, rgba(255,255,255,0.25), transparent),
      radial-gradient(1px 1px at 40% 80%, rgba(255,255,255,0.20), transparent);
    pointer-events: none; opacity: 1; transition: opacity 300ms ease;
  }
  .stage.is-ready::before { opacity: 0; }

  /* mobile: stack the topbar */
  @media (max-width: 900px) {
    .topbar { grid-template-columns: 1fr; height: auto; padding: 12px 16px; gap: 10px; }
    :root { --bar-h: 116px; }
    .topbar__hint { display: none; }
    .topbar__brand { justify-content: center; }
    .switcher { justify-self: center; }
    .switcher button { padding: 9px 12px; font-size: 12.5px; }
  }
  @media (max-width: 540px) {
    :root { --bar-h: 132px; }
    .switcher button .text { display: none; }
    .switcher button { padding: 9px 14px; }
  }
</style>
</head>
<body>
  <header class="topbar" role="banner">
    <div class="topbar__brand">
      <img src="assets/softfinity-horizontal-dark.svg" alt="Softfinity Consulting"/>
      <span class="meta"><strong>Concept review</strong> · three directions</span>
    </div>

    <div class="switcher" role="tablist" aria-label="Concept options">
      <button type="button" role="tab" data-option="a" aria-selected="true">
        <span class="letter">A</span><span class="text">Heritage</span>
      </button>
      <button type="button" role="tab" data-option="b" aria-selected="false">
        <span class="letter">B</span><span class="text">Corporate</span>
      </button>
      <button type="button" role="tab" data-option="c" aria-selected="false">
        <span class="letter">C</span><span class="text">Philosophy</span>
      </button>
    </div>

    <div class="topbar__hint" aria-live="polite">
      <span id="hint-text">Conservative rebrand — minimal change from the version Dad already approved.</span>
      &nbsp;·&nbsp;<kbd>1</kbd><kbd>2</kbd><kbd>3</kbd> to switch
    </div>
  </header>

  <main class="stage" id="stage">
    <iframe id="frame" title="Softfinity concept" src="options/a/index.html" allow="autoplay"></iframe>
  </main>

<script>
(function () {
  var OPTIONS = {
    a: {
      path: 'options/a/index.html',
      hint: 'Conservative rebrand — minimal change from the version Dad already approved.'
    },
    b: {
      path: 'options/b/index.html',
      hint: 'Corporate showcase — adds SIPA / MCIP / IPVF principles, industries, and a closing promise.'
    },
    c: {
      path: 'options/c/index.html',
      hint: 'Philosophy-led — bold anti-vendor stance, "zero loyalty, zero lock-in, zero compromise".'
    }
  };

  var frame = document.getElementById('frame');
  var stage = document.getElementById('stage');
  var hint  = document.getElementById('hint-text');
  var buttons = Array.prototype.slice.call(document.querySelectorAll('.switcher button'));

  function pick(letter, push) {
    var opt = OPTIONS[letter];
    if (!opt) return;
    // mark selected
    buttons.forEach(function (b) { b.setAttribute('aria-selected', b.dataset.option === letter ? 'true' : 'false'); });
    hint.textContent = opt.hint;
    // fade frame out, swap src, fade in
    frame.classList.remove('is-ready');
    stage.classList.remove('is-ready');
    if (frame.getAttribute('src') !== opt.path) {
      frame.setAttribute('src', opt.path);
    } else {
      // same path — just show
      frame.classList.add('is-ready');
      stage.classList.add('is-ready');
    }
    if (push !== false) {
      history.replaceState(null, '', '#' + letter);
    }
    document.title = 'Softfinity — concept ' + letter.toUpperCase() + ' · review';
  }

  // wire up buttons
  buttons.forEach(function (b) {
    b.addEventListener('click', function () { pick(b.dataset.option, true); });
  });

  // iframe ready -> fade in
  frame.addEventListener('load', function () {
    frame.classList.add('is-ready');
    stage.classList.add('is-ready');
  });

  // hash-based deep link (#a / #b / #c)
  function fromHash() {
    var h = (location.hash || '').replace('#', '').toLowerCase();
    if (OPTIONS[h]) pick(h, false);
  }
  window.addEventListener('hashchange', fromHash);
  fromHash();

  // keyboard: 1/2/3 to jump
  window.addEventListener('keydown', function (e) {
    if (e.target && /input|textarea|select/i.test(e.target.tagName)) return;
    if (e.key === '1') pick('a', true);
    else if (e.key === '2') pick('b', true);
    else if (e.key === '3') pick('c', true);
  });
})();
</script>
</body>
</html>
