<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Softfinity Consulting — Independent advice. Trusted expertise. Proven outcomes.</title>
<link rel="icon" href="/assets/favicon-32.png">

<!-- Fonts: load the Google Fonts CSS off the critical path so it can't block
     first paint. We preload it as a style (so the browser still fetches early
     and at high priority), then attach it via media="print" + onload swap
     so render isn't held up waiting for the request to come back. -->
<link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@300;400;500;600;700&family=Inter:wght@400;500;600&display=swap">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@300;400;500;600;700&family=Inter:wght@400;500;600&display=swap" media="print" onload="this.media='all'">
<noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@300;400;500;600;700&family=Inter:wght@400;500;600&display=swap"></noscript>

<!-- LCP imagery comes from images.unsplash.com — open the connection early. -->
<link rel="preconnect" href="https://images.unsplash.com" crossorigin>
<link rel="dns-prefetch" href="https://images.unsplash.com">

<!-- Polaris design system: tokens (concatenated into one file to cut six
     critical-path requests) + component styles. Individual token files
     still exist alongside for reference; only tokens.all.css is fetched. -->
<link rel="stylesheet" href="/_ds/polaris-design-system-ff4f726e-aab1-4c1d-81b4-8d99d607ad69/tokens/tokens.all.css">
<link rel="stylesheet" href="/_ds/polaris-design-system-ff4f726e-aab1-4c1d-81b4-8d99d607ad69/styles.css">

<!-- The DS bundle exposes window.PolarisDesignSystem_ff4f72 (used by every
     ds.tsx wrapper). It MUST execute before src/main.tsx. Defer scripts run
     in parse order, so it lives in <head> here to enter the defer queue
     before Vite's prod build injects its module entry near the end of
     <head>. main.tsx also waits for the 'load' event as a safety net in
     case the order ever changes. Icons are bundled via lucide-react; no
     external CDN script is needed. -->
<script defer src="/_ds/polaris-design-system-ff4f726e-aab1-4c1d-81b4-8d99d607ad69/_ds_bundle.js"></script>

<style>
  :root {
    --obsidian: #0B0B12;
    --ink: #15151F;
    --hairline: rgba(255,255,255,0.08);
    --hairline-2: rgba(255,255,255,0.14);
    --slate: #9CA3AF;
    --mist: #6B7280;
    --snow: #F3F4F6;
    --white: #FFFFFF;
    --gold: #C6A15B;
    --gold-deep: #9C7C3E;
    --amber: #E8821E;
    --bar-h: 64px;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--obsidian); color: var(--snow); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif; }

  /* ---------- top bar ---------- */
  .topbar {
    position: fixed; top: 0; left: 0; right: 0; height: var(--bar-h); z-index: 100;
    display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; gap: 16px;
    padding: 0 22px;
    background: linear-gradient(to bottom, rgba(11,11,18,0.94), rgba(11,11,18,0.84));
    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--hairline);
  }
  .topbar__brand { display: flex; align-items: center; gap: 12px; min-width: 0; }
  .topbar__brand img { height: 26px; width: auto; flex: none; }
  .topbar__brand .meta { font-size: 12px; color: var(--mist); letter-spacing: 0.04em; text-transform: uppercase; }
  .topbar__brand .meta strong { color: var(--gold); font-weight: 500; }

  /* segmented control */
  .switcher {
    display: inline-flex; padding: 4px; gap: 2px;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--hairline-2); border-radius: 999px;
  }
  .switcher button {
    appearance: none; border: 0; background: transparent; color: var(--slate);
    font: inherit; font-size: 13.5px; font-weight: 500; line-height: 1;
    padding: 9px 18px; border-radius: 999px; cursor: pointer;
    display: inline-flex; align-items: center; gap: 8px;
    transition: color 200ms ease, background 200ms ease;
  }
  .switcher button .letter {
    font-family: Georgia, "Times New Roman", serif;
    font-size: 13px; font-weight: 600; color: var(--gold);
    width: 20px; height: 20px; border-radius: 50%;
    background: rgba(198,161,91,0.10); border: 1px solid rgba(198,161,91,0.32);
    display: inline-flex; align-items: center; justify-content: center;
    flex: none;
  }
  .switcher button:hover { color: var(--snow); }
  .switcher button[aria-selected="true"] {
    background: var(--white); color: var(--obsidian);
  }
  .switcher button[aria-selected="true"] .letter {
    background: var(--gold); border-color: var(--gold); color: var(--obsidian);
  }

  /* right side: short blurb that changes per option */
  .topbar__hint {
    text-align: right; font-size: 12.5px; color: var(--mist);
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .topbar__hint kbd {
    font-family: inherit; font-size: 11px; padding: 2px 7px;
    background: rgba(255,255,255,0.06); border: 1px solid var(--hairline-2);
    border-radius: 6px; color: var(--snow); margin: 0 2px;
  }

  /* ---------- frame area ---------- */
  .stage {
    position: fixed; left: 0; right: 0; bottom: 0; top: var(--bar-h);
    background: var(--obsidian);
  }
  .stage iframe {
    width: 100%; height: 100%; border: 0; display: block;
    opacity: 0; transition: opacity 280ms ease;
  }
  .stage iframe.is-ready { opacity: 1; }

  /* loading shimmer */
  .stage::before {
    content: ""; position: absolute; inset: 0;
    background:
      radial-gradient(420px 200px at 50% 38%, rgba(198,161,91,0.10), transparent 70%),
      radial-gradient(1.4px 1.4px at 22% 28%, rgba(255,255,255,0.30), transparent),
      radial-gradient(1px 1px at 70% 60%, rgba(255,255,255,0.25), transparent),
      radial-gradient(1px 1px at 40% 80%, rgba(255,255,255,0.20), transparent);
    pointer-events: none; opacity: 1; transition: opacity 300ms ease;
  }
  .stage.is-ready::before { opacity: 0; }

  /* mobile: stack the topbar */
  @media (max-width: 900px) {
    .topbar { grid-template-columns: 1fr; height: auto; padding: 12px 16px; gap: 10px; }
    :root { --bar-h: 116px; }
    .topbar__hint { display: none; }
    .topbar__brand { justify-content: center; }
    .switcher { justify-self: center; }
    .switcher button { padding: 9px 12px; font-size: 12.5px; }
  }
  @media (max-width: 540px) {
    :root { --bar-h: 132px; }
    .switcher button .text { display: none; }
    .switcher button { padding: 9px 14px; }
  }
</style>
</head>
<body>
<a class="skip-link" href="#main-content">Skip to main content</a>
<div id="root"></div>
<script type="module" src="/src/main.tsx"></script>
</body>
</html>
